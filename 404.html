<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page introuvable · AllieFlix</title>
  <meta name="theme-color" content="#061317" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Inter, Arial, sans-serif;
      color: #effffd;
      background: linear-gradient(180deg, #061317, #0d2b31);
    }
    main {
      width: min(520px, 100%);
      padding: 32px;
      text-align: center;
      border: 1px solid rgba(92,205,202,.2);
      border-radius: 28px;
      background: rgba(8,27,32,.94);
    }
    h1 { margin: 0 0 10px; font-size: 2rem; }
    p { color: #9bd0cb; line-height: 1.6; }
    a {
      display: inline-block;
      margin-top: 10px;
      padding: 12px 18px;
      border-radius: 999px;
      color: #042023;
      font-weight: 800;
      text-decoration: none;
      background: #32d6c6;
    }
  </style>
</head>
<body>
  <main>
    <div aria-hidden="true">🎬</div>
    <h1>Cette séance n’existe pas</h1>
    <p>La page demandée est introuvable. Retourne à l’accueil d’AllieFlix pour choisir le prochain film.</p>
    <a href="./">Retour à AllieFlix</a>
  </main>
</body>
</html>
